<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jabalawi</title>
  </head>
  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color:red; z-index:99999; position:absolute; top:0; left:0; background:white; padding:20px; font-size:20px;">' + message + '<br/>' + (error ? error.stack : '') + '</div>';
      };
      window.onunhandledrejection = function(event) {
        document.body.innerHTML += '<div style="color:red; z-index:99999; position:absolute; top:0; left:0; background:white; padding:20px; font-size:20px;">Unhandled Promise Rejection: ' + event.reason + '</div>';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
